name: CI Training Pipeline

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-training-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
    defaults:
      run:
        working-directory: ./ai.assisted.continuous.integration
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: './ai.assisted.continuous.integration/package-lock.json'

      - run: npm ci

      - run: npx playwright install --with-deps

      - run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: ai.assisted.continuous.integration/playwright-report/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-traces
          path: ai.assisted.continuous.integration/test-results/