name: CI Training Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-training-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
    defaults:
      run:
        working-directory: ./ai.assisted.continuous.integration
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: './ai.assisted.continuous.integration/package-lock.json'

      - run: npm ci

      - run: npx playwright install --with-deps

      - run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: ai.assisted.continuous.integration/playwright-report/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-traces
          path: ai.assisted.continuous.integration/test-results/

      - if: failure()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "text": "❌ **Playwright Tests Failed**\n\n**PR Title:** ${{ github.event.pull_request.title || 'N/A' }}\n**Author:** ${{ github.actor }}\n**Branch:** ${{ github.ref_name }}\n**Link:** [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          }' ${{ secrets.TEAMS_WEBHOOK_URL }}

  security-scan:
    runs-on: ubuntu-latest
    continue-on-error: false
    defaults:
      run:
        working-directory: ./ai.assisted.continuous.integration
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: './ai.assisted.continuous.integration/package-lock.json'

      - run: npm ci

      - run: |
          echo "### Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high