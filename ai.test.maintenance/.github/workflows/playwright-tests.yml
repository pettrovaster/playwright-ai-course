name: Playwright Tests

on:
  pull_request:
    branches: [ main ]

# Cancel any in-progress run for the same PR to avoid redundant work
concurrency:
  group: playwright-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Minimal read-only permissions
permissions:
  contents: read

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true

    steps:
      # Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up the latest LTS Node.js with Yarn cache
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      # Install project dependencies using the frozen lockfile
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      # Install Playwright browsers and required OS dependencies
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      # Run the full Playwright test suite in parallel
      - name: Run Playwright tests
        run: yarn playwright test

      # Upload the HTML report so it can be inspected after the run
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30

      # Upload traces for failed tests to support debugging
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip
          retention-days: 30
